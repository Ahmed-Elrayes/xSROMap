name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: xsromap-*.tgz
          generate_release_notes: true
          body: |
            ## Install from npm
            ```bash
            npm install xsromap@${{ steps.get_version.outputs.VERSION }}
            ```
            
            ## Manual publish reminder
            After creating this release, publish to npm:
            ```bash
            npm publish --access public
            ```
